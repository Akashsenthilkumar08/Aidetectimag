<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - AI Detection App</title>
  <meta name="description" content="Manage your user profile, account settings, and change your password." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">
    <div id="sidebar"></div>
    <main class="main-content" data-page="profile">
      <div class="page-header">
        <div>
          <h1>👤 Profile</h1>
          <p class="page-header-sub">Manage your account settings</p>
        </div>
      </div>

      <div class="profile-grid">
        <div class="profile-card">
          <div class="profile-avatar" id="profileInitials">U</div>
          <div class="profile-name" id="profileName">Loading...</div>
          <div class="profile-email" id="profileEmail">...</div>
        </div>

        <div class="profile-details">
          <h3>Account Settings</h3>
          <form id="profileForm">
            <div class="form-group">
              <label for="updateFullName">Full Name</label>
              <input type="text" id="updateFullName" placeholder="Your full name" />
            </div>
            <div class="form-group">
              <label for="updateUsername">Username</label>
              <input type="text" id="updateUsername" placeholder="Your username" />
            </div>
            
            <h3 style="margin-top: 32px;">Change Password</h3>
            <div class="form-group">
              <label for="newPassword">New Password</label>
              <input type="password" id="newPassword" placeholder="Enter new password" />
            </div>
            
            <div class="form-actions" style="margin-top: 24px;">
              <button type="button" class="btn-primary" id="saveProfileBtn">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
