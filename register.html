<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - AI Detection App</title>
  <meta name="description" content="Create your account to start detecting AI-generated images." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Left: Register Form -->
      <div class="auth-left">
        <h1 class="auth-title">Create Account</h1>

        <form id="registerForm" class="auth-form" method="post">
          <div class="field">
            <label for="fullName">Full Name</label>
            <div class="input-row">
              <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required />
              <span class="field-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <div class="input-row">
              <input type="email" id="email" name="email" placeholder="Enter your email" required />
              <span class="field-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="username">Username</label>
            <div class="input-row">
              <input type="text" id="username" name="username" placeholder="Choose a username" required />
              <span class="field-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 7.5 19 4m0 0 2 2m-2-2-2 2m2-2 2-2M12 19.5v-4a4 4 0 0 0-8 0v4"/><circle cx="8" cy="9" r="3"/></svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="regPassword">Password</label>
            <div class="input-row">
              <input type="password" id="regPassword" name="password" placeholder="Create a password" required />
              <button type="button" class="field-icon toggle-pwd togglePwd" data-target="regPassword" aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <div class="input-row">
              <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required />
              <button type="button" class="field-icon toggle-pwd togglePwd" data-target="confirmPassword" aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-primary" id="registerBtn">Sign Up</button>

          <div class="social-login-divider">
            <span>Or continue with</span>
          </div>

          <div class="social-login-group">
            <button type="button" class="btn-social" id="googleRegBtn" aria-label="Sign up with Google">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.283 10.356h-8.327v3.451h4.792c-.446 2.193-2.313 3.453-4.792 3.453a5.27 5.27 0 0 1-5.279-5.28 5.27 5.27 0 0 1 5.279-5.279c1.259 0 2.397.447 3.29 1.178l2.6-2.599c-1.584-1.381-3.615-2.233-5.89-2.233a8.908 8.908 0 0 0-8.934 8.934 8.907 8.907 0 0 0 8.934 8.934c4.467 0 8.529-3.249 8.529-8.934 0-.528-.081-1.097-.202-1.625z"/></svg>
            </button>
            <button type="button" class="btn-social" id="githubRegBtn" aria-label="Sign up with GitHub">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            </button>
            <button type="button" class="btn-social" id="microsoftRegBtn" aria-label="Sign up with Microsoft">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zM24 11.4H12.6V0H24v11.4z"/></svg>
            </button>
          </div>

          <p class="switch-text">
            Already have an account? <a href="login.html">Login</a>
          </p>
        </form>
      </div>

      <!-- Right: Welcome Panel -->
      <div class="auth-right">
        <div class="diagonal-overlay"></div>
        <div class="right-content">
          <h2 class="welcome-heading">JOIN<br />US!</h2>
          <p class="welcome-sub">Start your journey in AI image analysis with our state-of-the-art detection engine.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
