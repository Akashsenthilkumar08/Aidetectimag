<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics - AI Detection App</title>
  <meta name="description" content="View analytics and statistics for your AI detection history." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar"></div>
    <main class="main-content" data-page="analytics">
      <div class="page-header">
        <div>
          <h1>📊 Analytics</h1>
          <p class="page-header-sub">Visualize your AI detection history and trends</p>
        </div>
      </div>

      <div class="detect-container">
        
        <!-- Summary Score Card -->
        <div class="detect-panel" style="text-align: center; margin-bottom: 24px;">
          <h3 style="margin-bottom: 8px;">Average Confidence Score</h3>
          <div id="avgConfidenceScore" style="
            font-family: var(--font-heading); 
            font-size: 3rem; 
            font-weight: 800; 
            background: linear-gradient(90deg, var(--accent), var(--border-glow-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          ">--%</div>
        </div>

        <div class="detect-grid-2">
          <!-- Pie Chart -->
          <div class="detect-panel">
            <h3>Real vs AI-Generated</h3>
            <div style="position: relative; height: 300px; width: 100%; display: flex; justify-content: center;">
              <canvas id="pieChart"></canvas>
            </div>
          </div>

          <!-- Bar Chart -->
          <div class="detect-panel">
            <h3>Detections by Category</h3>
            <div style="position: relative; height: 300px; width: 100%;">
              <canvas id="barChart"></canvas>
            </div>
          </div>
        </div>

        <div class="detect-panel" style="margin-top: 24px;">
          <h3>Detections Over Time</h3>
          <div style="position: relative; height: 350px; width: 100%;">
            <canvas id="lineChart"></canvas>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
