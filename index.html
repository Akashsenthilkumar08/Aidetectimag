<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AI Detection App</title>
  <meta name="description" content="Login to the AI Image Detection platform to analyze and detect AI-generated images." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Left: Login Form -->
      <div class="auth-left">
        <h1 class="auth-title">Login</h1>

        <form id="loginForm" class="auth-form" method="post">
          <div class="field">
            <label for="identifier">Username</label>
            <div class="input-row">
              <input type="text" id="identifier" name="identifier" placeholder="Enter your email" required />
              <span class="field-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-row">
              <input type="password" id="password" name="password" placeholder="Enter your password" required />
              <button type="button" id="togglePassword" class="field-icon toggle-pwd" aria-label="Show password">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </button>
            </div>
          </div>

          <div class="options">
            <label class="remember">
              <input type="checkbox" id="rememberMe" /> Remember Me
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-primary" id="loginBtn">Login</button>

          <div class="social-login-divider">
            <span>Or continue with</span>
          </div>

          <div class="social-login-group">
            <button type="button" class="btn-social" id="googleLoginBtn" aria-label="Login with Google">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.283 10.356h-8.327v3.451h4.792c-.446 2.193-2.313 3.453-4.792 3.453a5.27 5.27 0 0 1-5.279-5.28 5.27 5.27 0 0 1 5.279-5.279c1.259 0 2.397.447 3.29 1.178l2.6-2.599c-1.584-1.381-3.615-2.233-5.89-2.233a8.908 8.908 0 0 0-8.934 8.934 8.907 8.907 0 0 0 8.934 8.934c4.467 0 8.529-3.249 8.529-8.934 0-.528-.081-1.097-.202-1.625z"/></svg>
            </button>
            <button type="button" class="btn-social" id="githubLoginBtn" aria-label="Login with GitHub">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            </button>
            <button type="button" class="btn-social" id="microsoftLoginBtn" aria-label="Login with Microsoft">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zM24 11.4H12.6V0H24v11.4z"/></svg>
            </button>
          </div>

          <p class="switch-text">
            Don't have an account? <a href="register.html">Sign Up</a>
          </p>
        </form>
      </div>

      <!-- Right: Welcome Panel -->
      <div class="auth-right">
        <div class="diagonal-overlay"></div>
        <div class="right-content">
          <h2 class="welcome-heading">WELCOME<br />BACK!</h2>
          <p class="welcome-sub">Detect AI-generated images with confidence using our advanced deep-learning platform.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
